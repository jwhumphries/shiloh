{{ define "main" }}
<div class="page-container py-16 text-center">
  <h1 class="mb-4 text-6xl font-extrabold">404</h1>
  <p class="mb-8 text-xl text-base-content/70">
    {{ i18n "error.404_description" | default "The page you're looking for doesn't exist." }}
  </p>
  <a href="{{ "/" | relURL }}" class="btn btn-primary">
    {{ i18n "error.404_back_home" | default "Back to Home" }}
  </a>
</div>
{{ end }}
