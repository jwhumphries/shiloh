<!doctype html>
<html lang="{{ site.Language.LanguageCode | default "en" }}" dir="{{ site.Language.LanguageDirection | default "ltr" }}">
  {{- partial "head.html" . -}}
  <body class="flex min-h-screen flex-col bg-base-100 text-base-content">
    <script>
      const theme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'shiloh-dark' : 'shiloh');
      document.documentElement.setAttribute('data-theme', theme);
    </script>
    <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:z-50 focus:btn focus:btn-primary">
      {{ i18n "nav.skip_to_main" | default "Skip to main content" }}
    </a>

    {{- partial "header/basic.html" . -}}

    <main id="main-content" class="flex-1">
      {{- block "main" . }}{{- end }}
    </main>

    {{- partial "footer.html" . -}}

    {{ if .Site.Params.footer.showScrollToTop | default true }}
      <button
        id="scroll-to-top"
        class="btn btn-circle btn-primary fixed bottom-4 right-4 opacity-0 transition-opacity"
        aria-label="Scroll to top"
        onclick="window.scrollTo({top: 0, behavior: 'smooth'})"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18" />
        </svg>
      </button>
      <script>
        const scrollBtn = document.getElementById('scroll-to-top');
        window.addEventListener('scroll', () => {
          if (window.scrollY > 300) {
            scrollBtn.classList.remove('opacity-0');
          } else {
            scrollBtn.classList.add('opacity-0');
          }
        });
      </script>
    {{ end }}

    <script src="https://cdn.jsdelivr.net/npm/theme-change@2.5.0/index.js"></script>
  </body>
</html>
