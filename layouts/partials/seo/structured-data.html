{{ if .IsPage }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BlogPosting",
  "headline": {{ .Title | jsonify }},
  "description": {{ with .Description }}{{ . | jsonify }}{{ else }}{{ .Summary | plainify | truncate 160 | jsonify }}{{ end }},
  "url": {{ .Permalink | jsonify }},
  "datePublished": {{ .PublishDate.Format "2006-01-02T15:04:05Z07:00" | jsonify }},
  "dateModified": {{ .Lastmod.Format "2006-01-02T15:04:05Z07:00" | jsonify }},
  {{ with site.Params.author.name }}
  "author": {
    "@type": "Person",
    "name": {{ . | jsonify }}
    {{ with site.Params.author.links }}
    {{ range . }}
    {{ if .email }}
    ,"email": {{ strings.TrimPrefix "mailto:" .email | jsonify }}
    {{ end }}
    {{ end }}
    {{ end }}
  },
  {{ end }}
  "publisher": {
    "@type": "Organization",
    "name": {{ .Site.Title | jsonify }}
    {{ with site.Params.header.logo }}
    ,"logo": {
      "@type": "ImageObject",
      "url": {{ . | absURL | jsonify }}
    }
    {{ end }}
  },
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": {{ .Permalink | jsonify }}
  }
  {{ with .Params.topics }}
  ,"keywords": {{ delimit . ", " | jsonify }}
  {{ end }}
  {{ with .Params.feature }}
  {{ $image := $.Page.Resources.GetMatch . }}
  {{ if $image }}
  ,"image": {
    "@type": "ImageObject",
    "url": {{ $image.Permalink | jsonify }},
    "width": {{ $image.Width }},
    "height": {{ $image.Height }}
  }
  {{ end }}
  {{ end }}
}
</script>
{{ else if .IsHome }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": {{ .Site.Title | jsonify }},
  "url": {{ .Site.BaseURL | jsonify }}
  {{ with site.Params.description }}
  ,"description": {{ . | jsonify }}
  {{ end }}
  {{ if site.Params.enableSearch }}
  ,"potentialAction": {
    "@type": "SearchAction",
    "target": {
      "@type": "EntryPoint",
      "urlTemplate": {{ printf "%s?q={search_term_string}" .Site.BaseURL | jsonify }}
    },
    "query-input": "required name=search_term_string"
  }
  {{ end }}
}
</script>
{{ else if or .IsSection (eq .Kind "taxonomy") (eq .Kind "term") }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "CollectionPage",
  "headline": {{ .Title | jsonify }},
  {{ with .Description }}
  "description": {{ . | jsonify }},
  {{ end }}
  "url": {{ .Permalink | jsonify }},
  "publisher": {
    "@type": "Organization",
    "name": {{ site.Title | jsonify }}
    {{ with site.Params.header.logo }}
    ,"logo": {
      "@type": "ImageObject",
      "url": {{ . | absURL | jsonify }}
    }
    {{ end }}
  },
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": {{ .Permalink | jsonify }}
  }
  {{ if .Pages }}
  ,"numberOfItems": {{ len .Pages }}
  {{ end }}
}
</script>
{{ end }}
