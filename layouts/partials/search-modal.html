<dialog id="search-modal" class="modal items-start pt-16 sm:pt-24" aria-labelledby="search-modal-title" aria-modal="true" data-search-index="{{ "index.json" | relURL }}">
  <div class="modal-box max-w-3xl max-h-[calc(100vh-8rem)] sm:max-h-[calc(100vh-12rem)] flex flex-col">
    <form method="dialog">
      <button class="btn btn-sm btn-circle btn-soft absolute right-2 top-2" aria-label="{{ i18n "ui.close" | default "Close" }}">✕</button>
    </form>

    <h3 id="search-modal-title" class="font-bold text-lg mb-4 flex-shrink-0">
      {{ i18n "search.title" | default "Search" }}
    </h3>

    <div class="form-control flex-shrink-0">
      <label for="search-input" class="sr-only">{{ i18n "search.placeholder" | default "Search articles..." }}</label>
      <input
        type="text"
        id="search-input"
        placeholder="{{ i18n "search.placeholder" | default "Search articles..." }}"
        class="input input-primary w-full"
        autocomplete="off"
        aria-describedby="search-results"
      />
    </div>

    <div id="search-results" class="mt-6 overflow-y-auto flex-grow min-h-0">
      <div id="search-results-list" class="space-y-4"></div>
      <div id="search-no-results" class="hidden text-center py-8 text-base-content/60">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mx-auto mb-4 text-base-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <p>{{ i18n "search.no_results" | default "No results found" }}</p>
      </div>
      <div id="search-loading" class="hidden text-center py-8">
        <span class="loading loading-spinner loading-lg text-primary"></span>
      </div>
    </div>
  </div>
  <form method="dialog" class="modal-backdrop">
    <button>{{ i18n "ui.close" | default "Close" }}</button>
  </form>
</dialog>
