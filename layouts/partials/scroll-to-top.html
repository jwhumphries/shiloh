<button
  id="scroll-to-top"
  class="btn btn-circle btn-primary fixed bottom-6 right-6 opacity-0 transition-opacity duration-300 shadow-lg z-40"
  aria-label="{{ i18n "ui.scroll_to_top" | default "Scroll to top" }}"
  aria-hidden="true"
  tabindex="-1"
  onclick="window.scrollTo({top: 0, behavior: 'smooth'})"
>
  <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18" />
  </svg>
</button>

<script>
  (function() {
    const scrollBtn = document.getElementById('scroll-to-top');
    if (!scrollBtn) return;

    window.addEventListener('scroll', () => {
      if (window.scrollY > 300) {
        scrollBtn.classList.remove('opacity-0');
        scrollBtn.classList.add('opacity-100');
        scrollBtn.setAttribute('aria-hidden', 'false');
        scrollBtn.removeAttribute('tabindex');
      } else {
        scrollBtn.classList.remove('opacity-100');
        scrollBtn.classList.add('opacity-0');
        scrollBtn.setAttribute('aria-hidden', 'true');
        scrollBtn.setAttribute('tabindex', '-1');
      }
    });
  })();
</script>
