{{ $author := .Attributes.author }}

<blockquote class="border-l-4 border-primary pl-6 py-2 my-8 italic opacity-90" {{ range $k, $v := .Attributes }}{{ if ne $k "author" }} {{ $k }}="{{ $v }}"{{ end }}{{ end }}>
  <div class="[&_p]:text-base-content [&_p]:text-lg">
    {{ .Text }}
  </div>
  {{ with $author }}
  <footer class="mt-4 not-italic">
    <span class="text-base-content/50 text-base font-semibold">— {{ . }}</span>
  </footer>
  {{ end }}
</blockquote>
