defaultContentLanguage = "en"

enableRobotsTXT = true
summaryLength = 0

[pagination]
  pagerSize = 10

[outputs]
  home = ["HTML", "RSS", "JSON", "SearchData"]

[outputFormats]
  [outputFormats.SearchData]
    mediaType = "application/json"
    baseName = "search-data"
    isPlainText = true
    notAlternative = true

[privacy]
  [privacy.vimeo]
    enableDNT = true
  [privacy.x]
    enableDNT = true
  [privacy.youTube]
    privacyEnhanced = true

[services]
  [services.x]
    disableInlineCSS = true

