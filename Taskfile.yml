# https://taskfile.dev

version: '3'

vars:
  NAME: shiloh

tasks:
  default:
    desc: Show available tasks
    silent: true
    cmds:
      - task --list

  # Internal tasks
  docker-build:
    internal: true
    cmds:
      - docker build --target {{.TARGET}} -t {{.NAME}}:{{.TARGET}} --build-arg THEME_NAME={{.NAME}} .

  docker-run:
    internal: true
    cmds:
      - docker run --rm {{.DOCKER_ARGS}} -v "{{.USER_WORKING_DIR}}:/{{.NAME}}" {{.NAME}}:{{.TARGET}}

  clean-node-modules:
    internal: true
    cmds:
      - rm -rf node_modules

  # Public tasks
  dev:
    desc: Start development environment with live reload
    cmds:
      - echo "🎨 Starting Shiloh development environment..."
      - task: docker-build
        vars: { TARGET: dev }
      - defer: { task: clean-node-modules }
      - task: docker-run
        vars:
          TARGET: dev
          DOCKER_ARGS: -it -p 1313:1313
    silent: true

  release:
    desc: Sync Hugo module dependencies to package.json
    cmds:
      - echo "📦 Syncing Hugo module dependencies..."
      - task: docker-build
        vars: { TARGET: release }
      - task: docker-run
        vars: { TARGET: release }
    silent: true

  docs:
    desc: Build the documentation site
    cmds:
      - echo "🏗️ Building documentation site..."
      - task: docker-build
        vars: { TARGET: docs }
      - defer: { task: clean-node-modules }
      - task: docker-run
        vars: { TARGET: docs }
      - echo "📄 Site generated in exampleSite/public/"
    silent: true

  clean:
    desc: Clean all Docker images and generated files
    cmds:
      - echo "🧹 Cleaning up..."
      - docker rmi {{.NAME}}:dev {{.NAME}}:release {{.NAME}}:docs 2>/dev/null || true
      - rm -rf node_modules
      - rm -rf public
      - rm -rf exampleSite/public
      - rm -rf resources
      - echo "✅ Cleanup complete"
    silent: true
