name: CI
on:
  pull_request:
    branches:
      - dev
      - release

jobs:
  # Only runs for PRs targeting release branch
  check_source_branch:
    if: github.base_ref == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Check if source branch and repo are allowed
        run: |
          SOURCE_BRANCH="${{ github.event.pull_request.head.ref }}"
          ALLOWED_BRANCH="${{ github.event.repository.default_branch }}"
          SOURCE_REPO="${{ github.event.pull_request.head.repo.full_name }}"
          TARGET_REPO="${{ github.event.repository.full_name }}"

          if [ "$SOURCE_REPO" != "$TARGET_REPO" ]; then
            echo "Error: Pull requests from external forks are not allowed into 'release'."
            exit 1
          fi

          if [ "$SOURCE_BRANCH" != "$ALLOWED_BRANCH" ]; then
            echo "Error: Merges into 'release' are only allowed from the '$ALLOWED_BRANCH' branch."
            echo "You are trying to merge from '$SOURCE_BRANCH'."
            exit 1
          fi

  verify_build:
    runs-on: ubuntu-latest
    # For release PRs, wait for source branch check; for dev PRs, run immediately
    needs: [check_source_branch]
    if: always() && (needs.check_source_branch.result == 'success' || needs.check_source_branch.result == 'skipped')
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@8b402f58fbc84540c8b491a91e594a4576fec3d7 # v5
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('Dockerfile') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build Docker image with cache
        uses: docker/build-push-action@v6
        with:
          context: .
          target: docs
          load: true
          tags: shiloh:docs
          build-args: THEME_NAME=shiloh
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Build Docs
        run: |
          docker run --rm \
            --user $(id -u):$(id -g) \
            -e HOME=/tmp \
            -v "${{ github.workspace }}:/shiloh" \
            shiloh:docs

      - name: Verify Build Artifact
        run: |
          if [ ! -f "exampleSite/public/index.html" ]; then
            echo "Error: Build failed. exampleSite/public/index.html not found."
            ls -R exampleSite/public || echo "exampleSite/public does not exist"
            exit 1
          fi
          echo "Build verified successfully"

      # Rotate cache to prevent unbounded growth
      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache
