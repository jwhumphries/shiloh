name: Release Pipeline
on:
  push:
    branches:
      - release

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build_and_update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - name: Install Task
        run: |
          curl -1sLf 'https://dl.cloudsmith.io/public/task/task/setup.deb.sh' | sudo -E bash
          sudo apt-get install task

      - name: Build And Release
        run: task docs

      - name: Verify Build Artifact
        run: |
          if [ ! -f "exampleSite/public/index.html" ]; then
            echo "Error: Build failed. exampleSite/public/index.html not found."
            ls -R exampleSite/public || echo "exampleSite/public does not exist"
            exit 1
          fi

      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@a22cf08638b34d5badda920f9daf6e72c477b07b # v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: 'exampleSite/public/'

      - name: Commit and Push CSS
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [[ -n $(git status --porcelain assets/css/compiled/main.css) ]]; then
            echo "CSS changes detected. Committing..."
            git add assets/css/compiled/main.css
            git commit -m "chore(release): update compiled css [skip ci]"
            git push origin release
          else
            echo "No changes to 'assets/css/compiled/main.css'."
          fi

  deploy_docs:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build_and_update
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
