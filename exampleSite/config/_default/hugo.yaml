baseURL: https://example.org/
languageCode: en-us
title: Shiloh
theme: shiloh

pagination:
  pagerSize: 10

outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  colorScheme: shiloh
  defaultAppearance: light
  autoSwitchAppearance: true
  defaultThemeColor: "#ffffff"

  enableSearch: true
  enableCodeCopy: true
  enableImageLazyLoading: true
  enableImageWebp: true
  enableQuicklink: true

  description: "A modern Hugo theme built with Tailwind CSS v4, daisyUI, and FlyonUI"
  keywords:
    - hugo
    - theme
    - shiloh
    - tailwindcss
    - daisyui
    - flyonui

  mainSections:
    - samples

  author:
    name: "Shiloh Theme"
    headline: "Modern Hugo Theming"
    bio: "Built with Tailwind CSS v4, daisyUI v5, and FlyonUI v2"

  header: {}

  footer:
    showCopyright: true
    showAppearanceSwitcher: true
    showScrollToTop: true

  homepage:
    showRecent: true
    recentLimit: 6

  article:
    showDate: true
    showDateUpdated: false
    showAuthor: true
    showDraftLabel: true
    showHeadingAnchors: true
    showPagination: true
    showReadingTime: true
    showTableOfContents: true
    showTaxonomies: true
    showWordCount: false

  list:
    showBreadcrumbs: false
    showSummary: true
    groupByYear: false
    paginationWidth: 1

  taxonomy:
    showTermCount: true

menus:
  main:
    - name: Docs
      pageRef: /docs
      weight: 10
    - name: Samples
      pageRef: /samples
      weight: 20
    - name: About
      pageRef: /about
      weight: 30

  footer: []

taxonomies:
  tag: tags
  category: categories
